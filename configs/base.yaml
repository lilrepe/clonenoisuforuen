# NeuroFusionNet — Base Configuration
# Paper: "NeuroFusionNet: a hybrid EEG feature fusion framework for accurate
#         and explainable Alzheimer's Disease detection"
# Published: Scientific Reports (2025) 15:43742
# DOI: https://doi.org/10.1038/s41598-025-28070-x
#
# All values cited to paper section or flagged as [UNSPECIFIED].

preprocessing:
  bandpass_low: 0.5          # §Preprocessing, Eq. 2 — "4th-order Butterworth (0.5–45 Hz)"
  bandpass_high: 45.0        # §Preprocessing, Eq. 2
  butterworth_order: 4       # §Preprocessing, Eq. 2 — "4th-order Butterworth filter"
  ica_method: "infomax"      # §Preprocessing — "ICA using the Infomax algorithm"
  ica_kurtosis_threshold: 5.0    # §Preprocessing — "kurtosis > 5"
  ica_skewness_threshold: 2.0    # §Preprocessing — "skewness > 2"
  ica_variance_sd_threshold: 3.0  # §Preprocessing — "variance exceeding ± 3 SD"
  segment_length: 1000       # §Preprocessing, Eq. 7 — "non-overlapping segments of 1000 samples" (L=1000)

feature_extraction:
  # [UNSPECIFIED] Welch PSD window size and overlap not stated in paper
  # Using: 256-sample Hann window, 50% overlap (common default for EEG)
  # Alternatives: full segment window, various overlap fractions
  welch_nperseg: 256
  welch_noverlap: 128

  # EEG frequency bands — Fig. 1 and Table 10
  bands:
    delta: [0.5, 4.0]        # Fig. 1 — "Delta: 0–4 Hz"
    theta: [4.0, 7.0]        # Fig. 1 — "Theta: 4–7 Hz"
    alpha: [7.0, 13.0]       # Fig. 1 — "Alpha: 7–13 Hz"
    beta: [13.0, 40.0]       # Fig. 1 — "Beta: 13–40 Hz"
    gamma: [40.0, 45.0]      # Fig. 1 — "Gamma: 40–200 Hz" (capped at bandpass_high)

  wavelet: "db4"             # §Feature extraction — "Daubechies-4 (db4)"
  wavelet_level: 5           # §Feature extraction — "up to level 5"

  # [UNSPECIFIED] Permutation entropy ordinal pattern length m not stated
  # Using: m=3 (small and common for short EEG windows)
  # Alternatives: m=4, m=5 — require more data points per pattern
  perm_entropy_order: 3

cnn:
  n_filters: 64              # §Automated feature extraction — "64 filters... achieved optimal validation accuracy"
  kernel_size: 5             # §Automated feature extraction — "kernel size = 5"
  n_conv_layers: 3           # §Automated feature extraction — "three convolutional blocks"
  # [UNSPECIFIED] Per-layer filter counts not stated; paper gives range 32-128
  # Using: 32→64→128 (standard doubling progression within stated range)
  filter_progression: [32, 64, 128]
  # [PARTIALLY_SPECIFIED] Dropout "p=0.3–0.4" for CNN; exact value per-layer not separated from DNN
  # Using: 0.3 (lower bound of stated range)
  dropout_cnn: 0.3
  cnn_output_dim: 256        # Table 12 — "CNN Features (Global Pooling) d2 = 256"

feature_selection:
  # [UNSPECIFIED] PCC threshold for dropping correlated features not stated
  # Using: 0.95 (common threshold in EEG literature)
  pcc_threshold: 0.95
  # [UNSPECIFIED] PSO hyperparameters not stated
  # Using: typical defaults
  pso_n_particles: 30
  pso_n_iterations: 100

pca:
  variance_retained: 0.99    # §Feature extraction, Eq. 15-16 — "PCA retaining 99% of variance"
  # Results in dfinal ≈ 60-80 per Table 12

smote:
  # [UNSPECIFIED] SMOTE k_neighbors not stated
  k_neighbors: 5             # Using scikit-learn imbalanced-learn default
  random_state: 42

classifier:
  # Table 14 and Table 15 — layer-wise architecture
  dense1_units: 512          # Table 15 — "Dense-1: 512 units, p=0.4"
  dense2_units: 256          # Table 15 — "Dense-2: 256 units (ReLU)" — skip connection source
  dense3_units: 256          # Table 15 — "Dense-3: 256 units + skip, p=0.4"
  dense4_units: 128          # Table 15 — "Dense-4: 128 units, p=0.3"
  dense5_units: 64           # Table 15 — "Dense-5: 64 units, p=0.3"
  n_classes: 3               # Dataset ds004504: AD / FTD / CN
  dropout_p1: 0.4            # Table 14 — "p1 = 0.4"
  dropout_p2: 0.4            # Table 14 — "p2 = 0.4"
  dropout_p3: 0.3            # Table 14 — "p3 = 0.3"
  dropout_p4: 0.3            # Table 14 — "p4 = 0.3"
  # [UNSPECIFIED] BatchNorm epsilon not stated
  bn_eps: 1.0e-5             # Using PyTorch BatchNorm1d default

training:
  optimizer: "adam"          # Table 14 — "Optimizer: Adam"
  lr: 3.0e-4                 # Table 14 — "Initial Learning Rate: 3e-4"
  # [UNSPECIFIED] Adam beta1, beta2, epsilon not stated in paper
  adam_betas: [0.9, 0.999]   # Using PyTorch Adam defaults
  adam_eps: 1.0e-8           # Using PyTorch Adam default
  weight_decay: 0.001        # Table 14 — "L2 (λ = 0.001)"
  batch_size: 32             # Table 14 and Table 19 ablation — "32 (Optimal)"
  max_epochs: 500            # Table 14 — "Epochs: 500"
  early_stopping_patience: 10  # Table 14 — "Early Stopping = 10"
  val_split: 0.20            # Table 14 — "Validation Split: 20%"
  lr_scheduler: "reduce_on_plateau"
  lr_factor: 0.5             # Table 14 — "factor = 0.5"
  lr_patience: 10            # Table 14 — "patience = 10"
  use_class_weights: true    # Table 14 — "Class Weights: Inverse frequency-based"

cross_validation:
  n_folds: 5                 # §Results — "stratified 5-fold cross-validation"
  train_ratio: 0.70          # Table 16 — "70% training"
  val_ratio: 0.15            # Table 16 — "15% validation"
  test_ratio: 0.15           # Table 16 — "15% testing subjects"

data:
  sampling_rate: 500         # §Data acquisition — "500 Hz... Nihon Kohden EEG-2100"
  n_channels: 18             # §Data acquisition — "18 electrodes... 10-20 system"
  # Paths — user must supply (see README.md for download instructions)
  ds004504_path: "data/ds004504"
  ds006036_path: "data/ds006036"
  osf_path: "data/osf_eeg"
